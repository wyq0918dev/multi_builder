name: multi_builder
description: "Easily use multiple TransitionBuilder in WidgetsApp MaterialApp or CupertinoApp."
version: 1.4.0
repository: https://github.com/wyq0918dev/multi_builder

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        dartPluginClass: MultiBuilder
      ios:
        dartPluginClass: MultiBuilder
      linux:
        dartPluginClass: MultiBuilder
      macos:
        dartPluginClass: MultiBuilder
      windows:
        dartPluginClass: MultiBuilder
      web:
        pluginClass: MultiBuilderWeb
        fileName: multi_builder_web.dart
